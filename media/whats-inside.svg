<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="640" rx="20" fill="#1B2530"/>
  <text x="60" y="60" font-size="32" font-weight="700" fill="#F6F8F9">What's inside</text>
  <text x="60" y="94" font-size="18" fill="#B0C7E2">Nine pieces, grouped by what they do — six on by default, three you opt in.</text>
  <line x1="60" y1="114" x2="1140" y2="114" stroke="#FFFFFF" stroke-opacity="0.10"/>

  <!-- group rows -->
  <g font-size="16">
    <!-- Row 0: Clean context -->
    <g transform="translate(0,140)">
      <text x="60" y="38" font-size="20" font-weight="700" fill="#F6F8F9">Clean context</text>
      <text x="60" y="63" font-size="15" fill="#6B7D8F">keep the model's memory for the work</text>
      <g transform="translate(360,21)"><rect width="142" height="44" rx="10" fill="#232F3E" stroke="#00E0B8" stroke-opacity="0.45"/><circle cx="24" cy="22" r="6" fill="#00E0B8"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#CEFCF4">rtk-safe</text></g>
      <g transform="translate(518,21)"><rect width="160" height="44" rx="10" fill="#232F3E" stroke="#00E0B8" stroke-opacity="0.45"/><circle cx="24" cy="22" r="6" fill="#00E0B8"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#CEFCF4">statusline</text></g>
    </g>
    <line x1="60" y1="226" x2="1140" y2="226" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <!-- Row 1: Locked doors -->
    <g transform="translate(0,226)">
      <text x="60" y="38" font-size="20" font-weight="700" fill="#F6F8F9">Locked doors</text>
      <text x="60" y="63" font-size="15" fill="#6B7D8F">safe defaults from day one</text>
      <g transform="translate(360,21)"><rect width="206" height="44" rx="10" fill="#232F3E" stroke="#00E0B8" stroke-opacity="0.45"/><circle cx="24" cy="22" r="6" fill="#00E0B8"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#CEFCF4">secure-settings</text></g>
    </g>
    <line x1="60" y1="312" x2="1140" y2="312" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <!-- Row 2: Guarded exits -->
    <g transform="translate(0,312)">
      <text x="60" y="38" font-size="20" font-weight="700" fill="#F6F8F9">Guarded exits</text>
      <text x="60" y="63" font-size="15" fill="#6B7D8F">watch what leaves, and what runs</text>
      <g transform="translate(360,21)"><rect width="160" height="44" rx="10" fill="#232F3E" stroke="#00E0B8" stroke-opacity="0.45"/><circle cx="24" cy="22" r="6" fill="#00E0B8"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#CEFCF4">leak-guard</text></g>
      <g transform="translate(536,21)"><rect width="188" height="44" rx="10" fill="#232F3E" stroke="#00E0B8" stroke-opacity="0.45"/><circle cx="24" cy="22" r="6" fill="#00E0B8"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#CEFCF4">command-guard</text></g>
    </g>
    <line x1="60" y1="398" x2="1140" y2="398" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <!-- Row 3: Verify & hand off -->
    <g transform="translate(0,398)">
      <text x="60" y="38" font-size="20" font-weight="700" fill="#F6F8F9">Verify &amp; hand off</text>
      <text x="60" y="63" font-size="15" fill="#6B7D8F">check the work before it ships</text>
      <g transform="translate(360,21)"><rect width="170" height="44" rx="10" fill="#232F3E" stroke="#00E0B8" stroke-opacity="0.45"/><circle cx="24" cy="22" r="6" fill="#00E0B8"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#CEFCF4">shell-audit</text></g>
      <g transform="translate(546,21)"><rect width="142" height="44" rx="10" fill="#232F3E" stroke="#8A98FF" stroke-opacity="0.5"/><circle cx="24" cy="22" r="6" fill="none" stroke="#8A98FF" stroke-width="2"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#C3CBFF">/wrap-up</text></g>
    </g>
    <line x1="60" y1="484" x2="1140" y2="484" stroke="#FFFFFF" stroke-opacity="0.06"/>

    <!-- Row 4: Optional extras -->
    <g transform="translate(0,484)">
      <text x="60" y="38" font-size="20" font-weight="700" fill="#F6F8F9">Optional extras</text>
      <text x="60" y="63" font-size="15" fill="#6B7D8F">off until you want them</text>
      <g transform="translate(360,21)"><rect width="252" height="44" rx="10" fill="#232F3E" stroke="#8A98FF" stroke-opacity="0.5"/><circle cx="24" cy="22" r="6" fill="none" stroke="#8A98FF" stroke-width="2"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#C3CBFF">secure-deep-research</text></g>
      <g transform="translate(628,21)"><rect width="206" height="44" rx="10" fill="#232F3E" stroke="#8A98FF" stroke-opacity="0.5"/><circle cx="24" cy="22" r="6" fill="none" stroke="#8A98FF" stroke-width="2"/><text x="42" y="28" font-family="ui-monospace,'Geist Mono',monospace" fill="#C3CBFF">harness-pointer</text></g>
    </g>
  </g>

  <!-- legend -->
  <g transform="translate(60,600)" font-size="15">
    <circle cx="8" cy="-4" r="6" fill="#00E0B8"/><text x="24" y="1" fill="#B0C7E2">on by default</text>
    <circle cx="190" cy="-4" r="6" fill="none" stroke="#8A98FF" stroke-width="2"/><text x="206" y="1" fill="#B0C7E2">opt-in</text>
    <text x="1080" y="1" text-anchor="end" font-family="ui-monospace,'Geist Mono',monospace" fill="#6B7D8F">each piece is independent</text>
  </g>
</svg>
