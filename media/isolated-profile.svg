<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1200" height="470" rx="20" fill="#1B2530"/>
  <text x="60" y="62" font-size="30" font-weight="700" fill="#F6F8F9">A config dir is a whole Claude Code, in a folder.</text>
  <text x="60" y="98" font-size="18" fill="#B0C7E2">Point <tspan font-family="ui-monospace,'Geist Mono',monospace" fill="#6AD9FF">CLAUDE_CONFIG_DIR</tspan> elsewhere and you get a fully independent profile — its own settings, hooks, history, auth.</text>

  <!-- Card A: your existing setup -->
  <g transform="translate(60,134)">
    <rect width="500" height="210" rx="14" fill="#232F3E" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="28" y="50" font-family="ui-monospace,'Geist Mono',monospace" font-size="26" font-weight="700" fill="#DFE9F6">claude</text>
    <g transform="translate(330,30)"><rect width="142" height="34" rx="17" fill="#B0C7E2" fill-opacity="0.14"/><text x="71" y="23" text-anchor="middle" font-size="15" font-weight="600" fill="#CBDBEF">untouched</text></g>
    <text x="28" y="100" font-family="ui-monospace,'Geist Mono',monospace" font-size="19" fill="#6AD9FF">~/.claude</text>
    <text x="28" y="138" font-size="17" fill="#B0C7E2">Your existing setup — exactly as you</text>
    <text x="28" y="164" font-size="17" fill="#B0C7E2">left it. The kit never writes here</text>
    <text x="28" y="190" font-size="17" fill="#B0C7E2">unless you point at it explicitly.</text>
  </g>

  <!-- Card B: hardened profile -->
  <g transform="translate(640,134)">
    <rect width="500" height="210" rx="14" fill="#232F3E" stroke="#00E0B8" stroke-opacity="0.55"/>
    <text x="28" y="50" font-family="ui-monospace,'Geist Mono',monospace" font-size="26" font-weight="700" fill="#00E0B8">aka</text>
    <g transform="translate(322,30)"><rect width="150" height="34" rx="17" fill="#00E0B8" fill-opacity="0.16"/><text x="75" y="23" text-anchor="middle" font-size="15" font-weight="600" fill="#7DF8E2">isolated + hardened</text></g>
    <text x="28" y="100" font-family="ui-monospace,'Geist Mono',monospace" font-size="19" fill="#7DF8E2">~/.claude-aka</text>
    <text x="28" y="138" font-size="17" fill="#CEFCF4">Own settings, hooks, history, auth —</text>
    <text x="28" y="164" font-size="17" fill="#CEFCF4">with the guards on:</text>
    <g font-family="ui-monospace,'Geist Mono',monospace" font-size="14.5" fill="#7DF8E2">
      <text x="28" y="194">secure-settings ●  leak-guard ●  command-guard ●</text>
    </g>
  </g>

  <!-- alias bar -->
  <g transform="translate(60,372)">
    <rect width="1080" height="48" rx="10" fill="#161E27"/>
    <text x="22" y="31" font-family="ui-monospace,'Geist Mono',monospace" font-size="17"><tspan fill="#6AD9FF">alias</tspan><tspan fill="#DFE9F6"> aka=</tspan><tspan fill="#00E0B8">'CLAUDE_CONFIG_DIR="$HOME/.claude-aka" claude'</tspan></text>
  </g>
  <text x="60" y="452" font-size="16" fill="#6B7D8F">Same Claude Code binary. Delete the profile and your real <tspan font-family="ui-monospace,'Geist Mono',monospace" fill="#9AAABB">~/.claude</tspan> never changed.</text>
</svg>
