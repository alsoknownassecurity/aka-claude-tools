name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shell:
    name: shell — syntax & shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n (syntax) on every tracked shell file
        run: |
          set -euo pipefail
          # The installer runs under bash; every .sh must parse under bash, not zsh.
          rc=0
          while IFS= read -r f; do
            echo "bash -n $f"
            bash -n "$f" || rc=1
          done < <(git ls-files '*.sh')
          exit $rc
      - name: shellcheck (genuine-bug tier)
        run: |
          set -euo pipefail
          shellcheck --version
          # --severity=error fails only on real bugs, not style/info noise.
          # shellcheck and jq are preinstalled on ubuntu-latest runners.
          git ls-files '*.sh' | xargs --no-run-if-empty shellcheck --severity=error

  json:
    name: json — config validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: jq parse every tracked JSON file
        run: |
          set -euo pipefail
          jq --version
          rc=0
          while IFS= read -r f; do
            echo "jq empty $f"
            jq empty "$f" || rc=1
          done < <(git ls-files '*.json')
          exit $rc
