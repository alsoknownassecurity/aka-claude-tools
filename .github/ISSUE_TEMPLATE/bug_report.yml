name: Bug report
description: Something in the installer, hooks, or a profile behaves wrong.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Not a security report.** If a guard can be bypassed, data could be
        exfiltrated, or something auto-approves when it shouldn't, do **not** file
        it here — follow [SECURITY.md](https://github.com/alsoknownassecurity/aka-claude-tools/blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally against a sandbox config dir (`mktemp -d`), not your live `~/.claude*`.
      placeholder: |
        1. Run `./install.sh …`
        2. …
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS + version, shell, `bash --version`, `jq --version`, Claude Code version, and which profile/config dir.
      placeholder: macOS 15.5 / zsh / bash 5.2 / jq 1.7 / Claude Code x.y / ~/.claude-aka
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Installer output or hook errors. **Redact any tokens, paths, or hostnames you don't want public.**
      render: shell
    validations:
      required: false
